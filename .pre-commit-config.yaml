default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src tests
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check src tests
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-unit
        name: pytest unit
        entry: uv run pytest tests/unit/ -q
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-integration
        name: pytest integration
        entry: bash -c 'if [ -f .env.test ]; then export $(grep -v "^#" .env.test | xargs) && uv run pytest tests/integration/ -q; else echo "no .env.test, skipping"; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-smoke
        name: pytest smoke (claude -p + real API, costs money)
        entry: uv run pytest tests/smoke/ -q
        language: system
        pass_filenames: false
        stages: [pre-push]
